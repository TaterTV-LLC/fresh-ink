<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(74,59,40,0.1); border-radius: 3px; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #F5F0E8;
    color: #1C1208;
    font-family: 'DM Sans', sans-serif;
    overflow-x: hidden;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  /* Ambient background */
  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .ambient-orb1 { position: absolute; top: -18%; left: -8%; width: 550px; height: 550px; background: radial-gradient(circle, rgba(45,90,39,0.04), transparent 70%); filter: blur(90px); }
  .ambient-orb2 { position: absolute; bottom: -18%; right: -8%; width: 600px; height: 600px; background: radial-gradient(circle, rgba(125,43,58,0.03), transparent 70%); filter: blur(90px); }
  .ambient-scan { position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(74,59,40,0.005) 2px, rgba(74,59,40,0.005) 4px); }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 20px 100px; }

  /* ---- HERO / BRAND HEADER ---- */
  .brand-header {
    padding: 16px 0 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-left { display: flex; align-items: center; gap: 14px; }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #1C1208, #2D5A27);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-tagline {
    font-size: 10px;
    font-weight: 600;
    color: rgba(45,90,39,0.5);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }
  .brand-right {
    display: flex; flex-direction: row; align-items: center; gap: 8px;
  }
  .header-nav-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(74,59,40,0.14);
    background: rgba(74,59,40,0.04);
    color: rgba(74,59,40,0.7);
    font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px; text-decoration: none;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .header-nav-btn:hover {
    border-color: rgba(45,90,39,0.3);
    background: rgba(45,90,39,0.06);
    color: rgba(28,18,8,0.85);
  }
  .brand-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 600; color: rgba(74,59,40,0.3);
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
  }

  .dot { width: 7px; height: 7px; border-radius: 50%; background: #2D5A27; box-shadow: 0 0 10px rgba(45,90,39,0.5); animation: pulse 2s ease-in-out infinite; display: inline-block; }

  /* Country picker */
  .country-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid rgba(74,59,40,0.14);
    background: rgba(74,59,40,0.06);
    color: rgba(74,59,40,0.55);
    font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer; transition: all 0.2s ease;
    letter-spacing: 0.5px; flex-shrink: 0;
  }
  .country-btn:active { transform: scale(0.96); }
  .country-btn.active {
    border-color: rgba(45,90,39,0.5);
    background: rgba(45,90,39,0.1);
    color: #2D5A27;
  }
  .tag-line { font-size: 11px; font-weight: 700; color: rgba(74,59,40,0.4); text-transform: uppercase; letter-spacing: 3px; font-family: 'JetBrains Mono', monospace; }
  .subtitle { font-size: 12px; color: rgba(74,59,40,0.25); font-family: 'JetBrains Mono', monospace; }

  /* Week ribbon pills */
  .week-pill {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(74,59,40,0.12);
    background: rgba(74,59,40,0.05); cursor: pointer; transition: all 0.25s ease;
    min-width: 80px; position: relative;
  }
  .week-pill:active { transform: scale(0.96); }
  .week-pill.current { background: rgba(45,90,39,0.08); border-color: rgba(45,90,39,0.25); }
  .week-pill.selected { border-color: rgba(45,90,39,0.5); background: rgba(45,90,39,0.08); }
  .week-pill .pill-label { font-size: 10px; font-weight: 700; color: rgba(74,59,40,0.5); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
  .week-pill.current .pill-label { color: #2D5A27; }
  .week-pill.selected .pill-label { color: rgba(74,59,40,0.7); }
  .week-pill .pill-num { font-size: 20px; font-weight: 700; color: rgba(74,59,40,0.7); font-family: 'DM Sans', sans-serif; }
  .week-pill.selected .pill-num { color: #1C1208; }
  .week-pill .pill-month { font-size: 9px; color: rgba(74,59,40,0.3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
  .week-pill .pill-count { font-size: 9px; color: #2D5A27; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .talkshow-group { margin-top: 8px; }
  .talkshow-toggle {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 12px;
    border: 1px solid rgba(74,59,40,0.12);
    background: rgba(74,59,40,0.05);
    cursor: pointer; transition: all 0.2s ease;
    user-select: none; -webkit-user-select: none;
  }
  .talkshow-toggle:active { transform: scale(0.98); }
  .talkshow-toggle:hover { border-color: rgba(74,59,40,0.1); }
  .talkshow-toggle-label {
    font-size: 12px; font-weight: 600;
    color: rgba(74,59,40,0.65);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px; flex: 1;
  }
  .talkshow-toggle-count {
    font-size: 10px; color: rgba(74,59,40,0.4);
    font-family: 'JetBrains Mono', monospace;
  }
  .talkshow-toggle-chevron {
    font-size: 11px; color: rgba(74,59,40,0.45);
    transition: transform 0.25s ease;
  }
  .talkshow-group.open .talkshow-toggle-chevron { transform: rotate(180deg); color: rgba(45,90,39,0.7); }
  .talkshow-group.open .talkshow-toggle {
    border-color: rgba(45,90,39,0.25);
    background: rgba(45,90,39,0.06);
  }
  .talkshow-group.open .talkshow-toggle-label { color: rgba(28,18,8,0.85); }
  .talkshow-group.open .talkshow-toggle-count { color: rgba(45,90,39,0.7); }
  .talkshow-list { display: none; margin-top: 4px; }
  .talkshow-group.open .talkshow-list { display: grid; gap: 6px; margin-top: 8px; }

  /* Extra episodes collapsible */
  .eps-open .eps-list { display: flex !important; max-height: 800px !important; }
  .eps-open .eps-chevron { transform: rotate(180deg) !important; }

  /* Date ribbon */
  .date-ribbon { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 14px; scroll-behavior: smooth; }
  .date-btn {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(74,59,40,0.12);
    background: rgba(74,59,40,0.05); cursor: pointer; transition: all 0.25s ease;
    min-width: 68px; position: relative;
  }
  .date-btn:active { transform: scale(0.96); }
  .date-btn.today { background: rgba(45,90,39,0.08); border-color: rgba(45,90,39,0.25); }
  .date-btn.selected { border-color: rgba(45,90,39,0.5); background: rgba(45,90,39,0.08); }
  .date-btn .day-label { font-size: 10px; font-weight: 700; color: rgba(74,59,40,0.5); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
  .date-btn.today .day-label { color: #2D5A27; }
  .date-btn.selected .day-label { color: rgba(74,59,40,0.7); }
  .date-btn .day-num { font-size: 20px; font-weight: 700; color: rgba(74,59,40,0.7); font-family: 'DM Sans', sans-serif; }
  .date-btn.selected .day-num { color: #1C1208; }
  .date-btn .day-month { font-size: 9px; color: rgba(74,59,40,0.3); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
  .date-btn .count { font-size: 9px; color: #2D5A27; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .date-btn .loading-dot { width: 4px; height: 4px; border-radius: 50%; background: #2D5A27; animation: pulse 1s infinite; position: absolute; top: 6px; right: 6px; }



  /* Date sections */
  .date-section { margin-bottom: 36px; }
  .date-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    position: sticky; top: 0; z-index: 10;
    background: rgba(245,240,232,0.92); backdrop-filter: blur(12px);
    padding: 8px 0; margin-left: -20px; margin-right: -20px; padding-left: 20px; padding-right: 20px;
  }
  .date-header h2 { font-size: 15px; font-weight: 700; font-family: 'DM Sans', sans-serif; color: rgba(74,59,40,0.65); white-space: nowrap; }
  .date-header h2.today { color: #2D5A27; }
  .date-header .line { flex: 1; height: 1px; background: rgba(74,59,40,0.06); }
  .date-header .count { font-size: 11px; color: rgba(74,59,40,0.25); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }

  /* Show cards */
  .show-list { display: grid; grid-template-columns: 1fr; gap: 6px; }

  .show-row {
    border-radius: 12px; position: relative; overflow: hidden;
    border: 1px solid rgba(74,59,40,0.08); cursor: pointer;
    transition: all 0.25s ease;
    user-select: none; -webkit-user-select: none;
  }
  .show-row:hover { border-color: rgba(74,59,40,0.16); }
  .show-row .glow { position: absolute; top: 0; right: 0; width: 120px; height: 60px; pointer-events: none; }

  .show-row .summary {
    display: flex; align-items: center; gap: 10px; padding: 13px 14px;
    position: relative; z-index: 1;
  }
  .show-row .summary img { width: 36px; height: 36px; object-fit: cover; border-radius: 8px; flex-shrink: 0; opacity: 0.9; transition: width 0.35s ease, height 0.35s ease, border-radius 0.35s ease; }
  .show-row.expanded .summary img { width: 80px; height: 120px; border-radius: 10px; }
  .show-row .summary .img-placeholder { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .show-row .summary .title { font-size: 16px; font-weight: 700; color: #1C1208; font-family: 'DM Sans', sans-serif; }
  .show-row .summary .genre-pip { font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.6px; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
  .show-row .summary .network-sm { font-size: 11px; font-weight: 700; font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .show-row .summary .premiere-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; animation: pulse 2s infinite; }
  .show-row .summary .chevron { font-size: 14px; color: rgba(74,59,40,0.35); transition: transform 0.25s ease, color 0.25s ease; flex-shrink: 0; }
  .show-row.expanded .summary .chevron { transform: rotate(180deg); color: rgba(45,90,39,0.7); }

  .show-row .details {
    max-height: 0; overflow: hidden; transition: max-height 0.35s ease, padding 0.35s ease;
    padding: 0 14px;
  }
  .show-row.expanded .details { max-height: 1200px; padding: 0 14px 14px; }
  .show-row .details-inner { display: flex; gap: 14px; }
  .show-row .details-inner img { width: 56px; height: 80px; object-fit: cover; border-radius: 10px; flex-shrink: 0; opacity: 0.9; }
  .show-row .details-inner .detail-info { flex: 1; min-width: 0; }
  .show-row .meta { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .show-row .network { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .show-row .time { color: rgba(74,59,40,0.3); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
  .show-row .season-badge { color: rgba(74,59,40,0.45); font-size: 11px; font-family: 'JetBrains Mono', monospace; background: rgba(74,59,40,0.05); padding: 2px 7px; border-radius: 5px; white-space: nowrap; flex-shrink: 0; }
  .show-row .type-label { font-size: 10px; color: rgba(74,59,40,0.25); font-family: 'JetBrains Mono', monospace; }
  .show-row .ep-name { margin: 0 0 4px 0; color: rgba(74,59,40,0.55); font-size: 13px; font-style: italic; font-family: 'DM Sans', sans-serif; }
  .show-row .desc { margin: 0 0 8px 0; color: rgba(74,59,40,0.4); font-size: 13px; line-height: 1.5; font-family: 'DM Sans', sans-serif; }

  /* Collapsible summary sections */
  .summary-section { margin-bottom: 8px; }
  .summary-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; cursor: pointer; user-select: none; -webkit-user-select: none;
    border-radius: 8px; border: 1px solid rgba(74,59,40,0.07);
    background: rgba(74,59,40,0.03); transition: background 0.2s ease, border-color 0.2s ease;
  }
  .summary-toggle:active { background: rgba(74,59,40,0.06); }
  .summary-toggle .toggle-icon {
    width: 16px; height: 16px; border-radius: 4px;
    background: rgba(74,59,40,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: rgba(74,59,40,0.4);
    transition: all 0.2s ease; flex-shrink: 0;
    border: 1px solid rgba(74,59,40,0.08);
    transform: rotate(-90deg);
  }
  .summary-section.open .toggle-icon {
    background: rgba(45,90,39,0.12);
    color: rgba(45,90,39,0.8);
    border-color: rgba(45,90,39,0.2);
    transform: rotate(0deg);
  }
  .summary-toggle .toggle-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(74,59,40,0.6);
    transition: color 0.2s ease; flex: 1;
  }
  .summary-section.open .toggle-label { color: rgba(45,90,39,0.7); }
  .summary-section.open .summary-toggle {
    border-color: rgba(45,90,39,0.15);
    background: rgba(45,90,39,0.04);
  }
  .summary-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .summary-section.open .summary-body {
    max-height: 600px; opacity: 1;
  }
  .show-row .tags { display: flex; gap: 8px; flex-wrap: wrap; }
  .show-row .genre-tag { font-size: 9px; font-weight: 600; padding: 3px 10px; border-radius: 6px; font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.8px; }
  .show-row .rating-tag { font-size: 9px; font-weight: 600; color: rgba(74,59,40,0.4); background: rgba(74,59,40,0.05); padding: 3px 10px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; }
  .show-row .premiere-badge { color: #F5F0E8; font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; font-family: 'DM Sans', sans-serif; }
  .filter-badge { display: inline-block; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: rgba(168,48,42,0.15); color: #a8302a; border: 1px solid rgba(168,48,42,0.35); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.4px; text-transform: uppercase; }
  .show-row.is-filtered { opacity: 0.55; outline: 1px dashed rgba(168,48,42,0.35); }

  /* Loading */
  .loading-state { text-align: center; padding: 80px 20px; }
  .loading-dots { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .loading-dots span { font-size: 22px; animation: roll 1s ease-in-out infinite; display: inline-block; }
  .loading-dots span:nth-child(1) { animation-delay: 0s; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  .loading-text { color: rgba(74,59,40,0.4); font-size: 13px; font-family: 'JetBrains Mono', monospace; }

  .mini-loading { display: flex; gap: 8px; justify-content: center; padding: 40px 0; }
  .mini-loading span { font-size: 14px; animation: roll 1s ease-in-out infinite; display: inline-block; }
  .mini-loading span:nth-child(1) { animation-delay: 0s; }
  .mini-loading span:nth-child(2) { animation-delay: 0.15s; }
  .mini-loading span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes roll {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(180deg); }
  }

  
  
  
  
  
  
  
  



  /* Week nav buttons */
  .week-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; gap: 8px; padding: 10px 16px;
    background: rgba(245,240,232,0.94); backdrop-filter: blur(14px);
    border-top: 1px solid rgba(45,90,39,0.08);
  }
  .nav-btn {
    padding: 10px 12px; border-radius: 10px; border: 1px solid rgba(74,59,40,0.14);
    background: rgba(74,59,40,0.06); color: rgba(74,59,40,0.65);
    font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace;
    cursor: pointer; transition: all 0.2s ease;
  }
  .nav-btn:hover { background: rgba(45,90,39,0.08); color: rgba(74,59,40,0.7); border-color: rgba(45,90,39,0.2); }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn.flex { flex: 1; }

  /* Mode toggle */
  .mode-toggle {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px;
    background: rgba(74,59,40,0.04);
    border: 1px solid rgba(74,59,40,0.12); border-radius: 12px; padding: 4px;
  }
  .mode-btn {
    padding: 11px 8px; border-radius: 9px; border: none; background: transparent;
    color: rgba(74,59,40,0.45); font-size: 11px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; cursor: pointer; transition: all 0.2s ease;
    letter-spacing: 0.3px; white-space: nowrap; text-align: center;
  }
  .mode-btn:active { transform: scale(0.97); }
  .mode-btn.active {
    background: rgba(45,90,39,0.15); color: #2D5A27;
    border: 1px solid rgba(45,90,39,0.25);
  }
  .mode-btn.full-width { grid-column: unset; }

  /* Network filter */
  .network-filter-wrap {
    margin-bottom: 12px; position: relative;
  }
  .network-select {
    width: 100%; padding: 10px 36px 10px 14px;
    background: rgba(74,59,40,0.05);
    border: 1px solid rgba(74,59,40,0.1);
    border-radius: 11px;
    color: rgba(74,59,40,0.6);
    font-size: 12px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer; outline: none;

function primeChannelUrl(streamer) {
  return PRIME_CHANNELS[streamer] || null;

// Append our affiliate tag to an existing Amazon/Prime Video URL.
// Strips any existing tag= param to avoid double-tagging.
function appendAffiliateTag(url) {
  try {
    const u = new URL(url);
    u.searchParams.delete("tag");
    u.searchParams.set("tag", AMAZON_AFFILIATE_TAG);
    return u.toString();
  } catch {
    return url + (url.includes("?") ? "&" : "?") + `tag=${AMAZON_AFFILIATE_TAG}`;
  }

// Returns { url, label } for an affiliate-earning Watch button, or null
// if this show's network isn't monetizable (Netflix, Disney+, etc.).
function buildWatchUrl(show) {
  const netLower = (show.network || "").toLowerCase();

  // Native Prime Video — prefer a direct Amazon/PV deep link if TVMaze gave us one,
  // otherwise fall back to Prime Video search by title.
  if (netLower.includes("prime video") || netLower.includes("amazon")) {
    const site = show.officialSite || "";
    if (site && (site.includes("amazon.com") || site.includes("primevideo.com"))) {
      return { url: appendAffiliateTag(site), label: "Watch on Prime Video" };
    }
    const q = encodeURIComponent(show.title || "");
    return {
      url: `https://www.amazon.com/gp/video/search?phrase=${q}&tag=${AMAZON_AFFILIATE_TAG}`,
      label: "Watch on Prime Video"

  //  1. native streamer/webChannel name match (Starz, BritBox, Apple TV+, etc.)
  //  2. else map cable network → streaming home (HBO → HBO Max, NBC → Peacock)
  //

  // TVMaze variants all resolve: "Apple TV" / "Apple TV+" / "Apple TV Plus" →
  // the "Apple TV+" key; "AMC+" / "AMC +" → "AMC+"; etc. Apple renamed
  // "Apple TV+" to "Apple TV" in 2025 so TVMaze records contain BOTH forms.
  const normalize = s => (s || "").toLowerCase()
    .replace(/\bplus\b/g, "")      // "apple tv plus" → "apple tv "
    .replace(/[+\s._-]/g, "");     // strip +, spaces, ._- → "appletv"
  const netNorm = normalize(show.network);

  let streamer = null;
  for (const channel of Object.keys(PRIME_CHANNELS)) {
    const chNorm = normalize(channel);
    // Require the normalized network to START with the normalized channel key
    // (not just include) so short keys can't false-match unrelated networks.
    if (netNorm === chNorm || netNorm.startsWith(chNorm)) { streamer = channel; break; }
  }
  if (!streamer) streamer = getStreamingHome(show.network);

  const channelUrl = streamer ? primeChannelUrl(streamer) : null;
  if (channelUrl) {
    return { url: channelUrl, label: "Watch on Prime Video" };
  }

  // Not monetizable: Netflix, Disney+, Hulu, The Roku Channel, or any
  // network that doesn't resolve to a Prime channel → no button.
  return null;
}

// Date helpers
function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDate(d) { return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); }
function todayKey() { return dateKey(new Date()); }
function yesterdayKey() { const y = new Date(); y.setDate(y.getDate()-1); return dateKey(y); }
function isToday(dk) { return dk === todayKey(); }
function isYesterday(dk) { return dk === yesterdayKey(); }
function tomorrowKey() { const t = new Date(); t.setDate(t.getDate()+1); return dateKey(t); }
function isTomorrow(dk) { return dk === tomorrowKey(); }
function isPast(dk) { return dk < todayKey(); }
function fmt12h(t) {
  if (!t || t === "Streaming" || t === "TBA") return t;
  const [h, m] = t.split(":").map(Number);
  if (isNaN(h)) return t;
  const period = h >= 12 ? "PM" : "AM";
  const hour = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${hour}:${String(m).padStart(2,"0")} ${period}`;
}

function getDates() {
  const dates = [];
  const today = new Date();
  for (let i = -7; i <= 7; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    dates.push(d);
  }
  return dates;
}

const allDates = getDates();

// Parse episodes

const TZ_LABELS = {
  "America/New_York": "ET", "America/Chicago": "CT", "America/Denver": "MT",
  "America/Los_Angeles": "PT", "America/Toronto": "ET", "America/Vancouver": "PT",
  "Europe/London": "GMT", "Europe/Dublin": "GMT", "Australia/Sydney": "AEST",
  "Pacific/Auckland": "NZST",
};
function tzLabel(tz) { return TZ_LABELS[tz] || ""; }

function parseBroadcast(ep) {
  const show = ep.show || {};
  const network = show.network?.name || show.webChannel?.name || "Unknown";
  const tz = show.network?.country?.timezone || show.webChannel?.country?.timezone || "";
  const isSeriesPremiere = ep.season === 1 && ep.number === 1;
  const isSeasonPremiere = ep.season > 1 && ep.number === 1;
  const isPremiere = isSeriesPremiere || isSeasonPremiere;
  let seasonStr = "";
  if (isSeriesPremiere) seasonStr = "Series Premiere";
  else if (isSeasonPremiere) seasonStr = `Season ${ep.season} Premiere`;
  else if (ep.season && ep.number) seasonStr = `S${String(ep.season).padStart(2,"0")} E${String(ep.number).padStart(2,"0")}`;
  return {
    id: `b-${ep.id}`, title: show.name || ep.name || "Unknown",
    episodeName: ep.name || "", network,
    webChannel: show.webChannel?.name || null,
    time: ep.airtime || "TBA", tz: tzLabel(tz), season: seasonStr,
    seasonNum: ep.season || null, epNum: ep.number || null,
    genre: show.genres?.[0] || "Other",
    showDescription: (show.summary || "").replace(/<[^>]*>/g, "").trim().slice(0, 500),
    epDescription: (ep.summary || "").replace(/<[^>]*>/g, "").trim().slice(0, 300),
    isSeason1: ep.season === 1, isSeriesPremiere, isSeasonPremiere, isPremiere,
    rating: show.rating?.average ? `${show.rating.average}/10` : null,
    image: show.image?.medium || null, showType: show.type || "", weight: show.weight || 0,
    _excludeReason: ep._filterReason || null,
    imdbId: show.externals?.imdb || null,
    officialSite: show.officialSite || null,
  };
}

function parseWeb(ep) {
  const show = ep._embedded?.show || {};
  const network = ep.webChannel?.name || show.webChannel?.name || "Streaming";
  const tz = ep.webChannel?.country?.timezone || show.webChannel?.country?.timezone || show.network?.country?.timezone || "";
  const isSeriesPremiere = ep.season === 1 && ep.number === 1;
  const isSeasonPremiere = ep.season > 1 && ep.number === 1;
  const isPremiere = isSeriesPremiere || isSeasonPremiere;
  let seasonStr = "";
  if (isSeriesPremiere) seasonStr = "Series Premiere";
  else if (isSeasonPremiere) seasonStr = `Season ${ep.season} Premiere`;
  else if (ep.season && ep.number) seasonStr = `S${String(ep.season).padStart(2,"0")} E${String(ep.number).padStart(2,"0")}`;
  return {
    id: `w-${ep.id}`, title: show.name || ep.name || "Unknown",
    episodeName: ep.name || "", network,
    time: ep.airtime || "Streaming", tz: tzLabel(tz), season: seasonStr,
    seasonNum: ep.season || null, epNum: ep.number || null,

    _excludeReason: ep._filterReason || null,

  };
}

// Fetch
async function fetchDate(dk) {
  if (state.fetchedDates.has(dk)) return;
  state.fetchedDates.add(dk);
  state.loadingDates.add(dk);

  // Only show loader if fetch takes more than 150ms and there's nothing to show yet
  const loaderTimer = setTimeout(() => {
    if (state.loadingDates.has(dk) && !state.showsByDate[dk]) render();
  }, 150);

  const results = [];

  // Fetch from our Worker API for each selected country
  const fetches = [...state.countries].map(cc =>
    fetch(`${TATERTV_API}/schedule?date=${dk}&country=${cc}${state.debugMode ? '&debug=true' : ''}`)
      .then(r => r.ok ? r.json() : null)
      .catch(() => null)
  );

  const responses = await Promise.all(fetches);
  const seenWebEpisodes = new Set();

  responses.forEach(data => {
    if (!data) return;

    // Process broadcast episodes — Worker handles all filtering server-side
    if (Array.isArray(data.broadcast)) {
      data.broadcast.forEach(ep => {
        const s = parseBroadcast(ep);
        if (s) results.push(s);
      });
    }

    // Process web/streaming episodes — Worker handles all filtering server-side
    if (Array.isArray(data.web)) {
      data.web.forEach(ep => {
        if (seenWebEpisodes.has(ep.id)) return;
        seenWebEpisodes.add(ep.id);
        const s = parseWeb(ep);
        if (s) results.push(s);
      });
    }
  });

  // Dedupe exact same episode from multiple sources
  const seen = new Set();
  const deduped = results.filter(s => {
    const k = `${s.title}-${s.season}-${s.episodeName}`;
    if (seen.has(k)) return false;
    seen.add(k); return true;
  });

  // Group by title for multi-episode cards
  const grouped = {};
  deduped.forEach(s => {
    if (!grouped[s.title]) {
      grouped[s.title] = { ...s, extraEpisodes: [] };
    } else {
      grouped[s.title].extraEpisodes.push(s);
      // Bubble up premiere if extra ep is a premiere and primary isn't
      if (s.isPremiere && !grouped[s.title].isPremiere) {
        grouped[s.title].isPremiere = true;
        grouped[s.title].isSeriesPremiere = s.isSeriesPremiere;
        grouped[s.title].isSeasonPremiere = s.isSeasonPremiere;
        grouped[s.title].season = s.season;
      }
    }
  });
  const grouped_shows = Object.values(grouped);

  // Smart sort
  grouped_shows.forEach(s => {
    let score = 0;
    if (s.isSeriesPremiere) score += 10000;
    else if (s.isSeasonPremiere) score += 5000;
    score += (s.weight || 0) * 3;
    s._score = score;
  });
  grouped_shows.sort((a, b) => {
    if (b._score !== a._score) return b._score - a._score;
    const at = t => (!t || t === "TBA" || t === "Streaming") ? "99:99" : t;
    return at(a.time).localeCompare(at(b.time));
  });

  clearTimeout(loaderTimer);
  state.showsByDate[dk] = grouped_shows;
  state.loadingDates.delete(dk);
  if (state.mode === "premieres") renderPremieresRibbon();
  render();
}

function toggleDate(dk) {
  // Single select — just switch to tapped date
  if (state.selectedDates.has(dk) && state.selectedDates.size === 1) return; // already the only one
  state.selectedDates.clear();
  state.selectedDates.add(dk);
  fetchDate(dk);
  render();
  setTimeout(() => {
    const ribbon = document.getElementById("dateRibbon");
    const btn = ribbon?.querySelector(`[onclick="toggleDate('${dk}')"]`);
    if (btn && ribbon) {
      const left = btn.offsetLeft - ribbon.offsetWidth / 2 + btn.offsetWidth / 2;
      ribbon.scrollTo({ left, behavior: "smooth" });
    }
  }, 50);
  // Silently prefetch adjacent days
  const d = new Date(dk + "T12:00:00");
  const prev = new Date(d); prev.setDate(d.getDate() - 1);
  const next = new Date(d); next.setDate(d.getDate() + 1);
  fetchDate(dateKey(prev));
  fetchDate(dateKey(next));
}

function selectDateRange(startOffset, endOffset) {
  const today = new Date();
  state.selectedDates.clear();
  for (let i = startOffset; i <= endOffset; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const dk = dateKey(d);
    if (allDates.some(ad => dateKey(ad) === dk)) {
      state.selectedDates.add(dk); fetchDate(dk);
    }
  }
  render();
}

function selectSingleDate(offset) {
  const d = new Date(); d.setDate(d.getDate() + offset);
  state.selectedDates.clear();
  const dk = dateKey(d);
  state.selectedDates.add(dk); fetchDate(dk);
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
  // Scroll date ribbon to keep selected date in view
  setTimeout(() => {
    const ribbon = document.getElementById("dateRibbon");
    const btn = ribbon?.querySelector(`[onclick="toggleDate('${dk}')"]`);
    if (btn && ribbon) {
      const left = btn.offsetLeft - ribbon.offsetWidth / 2 + btn.offsetWidth / 2;
      ribbon.scrollTo({ left, behavior: "smooth" });
    }
  }, 50);
  // Silently prefetch adjacent days
  const prev = new Date(); prev.setDate(prev.getDate() + offset - 1);
  const next = new Date(); next.setDate(next.getDate() + offset + 1);
  fetchDate(dateKey(prev));
  fetchDate(dateKey(next));
}

function setMode(mode) {
  state.mode = mode;
  state.networkFilter = "All";
  document.getElementById("btnGuide").classList.toggle("active", mode === "guide");
  document.getElementById("btnCalendar").classList.toggle("active", mode === "calendar");
  document.getElementById("btnPremieres").classList.toggle("active", mode === "premieres");
  document.getElementById("dateRibbon").style.display = mode === "guide" ? "" : "none";
  document.getElementById("premieresRibbon").style.display = mode === "premieres" ? "" : "none";
  document.getElementById("calendarWrap").style.display = mode === "calendar" ? "" : "none";
  document.getElementById("weekBtns").style.display = mode === "guide" ? "" : "none";
  document.getElementById("premieresNav").style.display = mode === "premieres" ? "" : "none";

  if (mode === "guide") {
    // Reset to yesterday/today/tomorrow
    state.selectedDates.clear();
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    const tod = new Date();
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    [yest, tod, tmrw].forEach(d => {
      const dk = dateKey(d);
      state.selectedDates.add(dk);
      fetchDate(dk);
    });
    setTimeout(() => {
      const btn = document.getElementById("dateTodayBtn");
      const ribbon = document.getElementById("dateRibbon");
      if (btn && ribbon) {
        const left = btn.offsetLeft - ribbon.offsetWidth / 2 + btn.offsetWidth / 2;
        ribbon.scrollTo({ left, behavior: "smooth" });
      }
    }, 100);
  }

  if (mode === "calendar") {
    // Reset to current month, today selected
    state.calendarMonth = new Date();
    state.selectedDates.clear();
    const dk = dateKey(new Date());
    state.selectedDates.add(dk);
    fetchDate(dk);
    renderCalendar();
  }

  if (mode === "premieres") {
    state.premieresWeekOffset = 0;
    state.selectedDates.clear();
    const sunday = getSundayOfWeek(0);
    for (let i = 0; i <= 6; i++) {
      const d = new Date(sunday); d.setDate(sunday.getDate() + i);
      const dk = dateKey(d);

function renderCalendar() {
  const wrap = document.getElementById("calendarWrap");
  const m = state.calendarMonth;
  const year = m.getFullYear();
  const month = m.getMonth();
  const monthName = m.toLocaleDateString("en-US", { month: "long", year: "numeric" });
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const todayDk = dateKey(today);

  // ±3 month boundary check
  const todayMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  const monthDiff = (year - todayMonth.getFullYear()) * 12 + (month - todayMonth.getMonth());
  const atPastLimit = monthDiff <= -3;
  const atFutureLimit = monthDiff >= 3;

  let cells = "";
  for (let i = 0; i < firstDay; i++) {
    cells += `<div class="calendar-day empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const dk = dateKey(date);
    const isToday = dk === todayDk;
    const isPast = date < today && !isToday;
    const isSelected = state.selectedDates.has(dk);

    const shows = state.showsByDate[dk] || [];

    let dots = "";

    const searchHighlight = "";
    const classes = ["calendar-day", isToday ? "today" : "", isSelected ? "selected" : "", isPast ? "past" : ""].filter(Boolean).join(" ");

    cells += `<div class="${classes}" onclick="calendarSelectDay('${dk}')">
      <span class="pday-num">${d}</span>
      <div class="pday-dots">${dots}</div>
    </div>`;
  }

  wrap.innerHTML = `<div class="calendar-header">
    <span class="calendar-month-label">${monthName}</span>
    <div class="calendar-nav">
      <button onclick="calendarPrevMonth()" ${atPastLimit ? "disabled" : ""}>‹</button>
      <button onclick="calendarNextMonth()" ${atFutureLimit ? "disabled" : ""}>›</button>
    </div>
  </div>
  <div class="calendar-weekdays">
    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
  </div>
  <div class="calendar-grid">${cells}</div>`;
}

function calendarSelectDay(dk) {
  state.selectedDates.clear();
  state.selectedDates.add(dk);
  fetchDate(dk);
  renderCalendar();
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
  // Silently prefetch adjacent days
  const d = new Date(dk + "T12:00:00");
  const prev = new Date(d); prev.setDate(d.getDate() - 1);
  const next = new Date(d); next.setDate(d.getDate() + 1);
  fetchDate(dateKey(prev));
  fetchDate(dateKey(next));
}

function calendarPrevMonth() {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() - 1, 1);
  renderCalendar();
}

function calendarNextMonth() {
  state.calendarMonth = new Date(state.calendarMonth.getFullYear(), state.calendarMonth.getMonth() + 1, 1);
  renderCalendar();
}

function getCurrentOffset() {
  const today = dateKey(new Date());
  const sorted = [...state.selectedDates].sort();
  if (sorted.length === 0) return 0;
  // Use the middle/first selected date as reference
  const ref = sorted[Math.floor(sorted.length / 2)];
  const refDate = new Date(ref + "T12:00:00");
  const todayDate = new Date(today + "T12:00:00");
  return Math.round((refDate - todayDate) / 86400000);
}

function getSundayOfWeek(offsetWeeks) {
  const today = new Date();
  const day = today.getDay(); // 0=Sun
  const sunday = new Date(today);
  sunday.setDate(today.getDate() - day + offsetWeeks * 7);
  sunday.setHours(0,0,0,0);
  return sunday;
}

function renderPremieresRibbon() {
  const ribbon = document.getElementById("premieresRibbon");
  if (!ribbon) return;
  const currentOffset = state.premieresWeekOffset;
  let html = "";
  for (let w = -6; w <= 6; w++) {
    const sunday = getSundayOfWeek(w);
    const label = w === 0 ? "This Week" : w === -1 ? "Last Week" : w === 1 ? "Next Week" : w < 0 ? `${Math.abs(w)}w ago` : `In ${w}w`;
    const dateStr = sunday.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    const isSelected = w === currentOffset;
    const isCurrent = w === 0;
    const classes = ["week-pill", isCurrent ? "current" : "", isSelected ? "selected" : ""].filter(Boolean).join(" ");

    // Count premieres for this week
    let premiereCount = 0;
    for (let i = 0; i <= 6; i++) {
      const d = new Date(sunday); d.setDate(sunday.getDate() + i);
      const dk = dateKey(d);
      const shows = state.showsByDate[dk] || [];
      premiereCount += shows.filter(s => s.isPremiere).length;
    }
    const countHTML = premiereCount > 0
      ? `<span class="pill-count">${premiereCount} new</span>`
      : `<span class="pill-count" style="opacity:0">0</span>`;

    html += `<div class="${classes}" onclick="selectPremiereWeek(${w})">
      <span class="pill-label">${label}</span>
      <span class="pill-num">${sunday.getDate()}</span>
      <span class="pill-month">${sunday.toLocaleDateString("en-US", { month: "short" })}</span>
      ${countHTML}
    </div>`;
  }
  ribbon.innerHTML = html;
  // Scroll selected into view — use longer timeout for mobile rendering
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const selected = ribbon.querySelector(".selected");
      if (selected && ribbon) {
        const left = selected.offsetLeft - ribbon.offsetWidth / 2 + selected.offsetWidth / 2;
        ribbon.scrollLeft = left;
      }
    });
  });
}

function selectPremiereWeek(w) {
  state.premieresWeekOffset = w;
  state.selectedDates.clear();
  const sunday = getSundayOfWeek(state.premieresWeekOffset);
  for (let i = 0; i <= 6; i++) {
    const d = new Date(sunday); d.setDate(sunday.getDate() + i);
    const dk = dateKey(d);
    state.selectedDates.add(dk);
    fetchDate(dk);
  }
  // Silently prefetch adjacent weeks
  [-1, 1].forEach(adj => {
    const adjSunday = getSundayOfWeek(state.premieresWeekOffset + adj);
    for (let i = 0; i <= 6; i++) {
      const d = new Date(adjSunday); d.setDate(adjSunday.getDate() + i);
      fetchDate(dateKey(d));
    }
  });
  renderPremieresRibbon();
  window.scrollTo({ top: 0, behavior: "smooth" });
  render();
}

const ALL_COUNTRIES = ["US", "GB", "CA", "AU"];

function toggleCountry(code) {
  if (code === "ALL") {
    if (state.countries.size === ALL_COUNTRIES.length) return; // already all selected
    state.countries.clear();
    ALL_COUNTRIES.forEach(c => state.countries.add(c));
  } else {
    if (state.countries.has(code) && state.countries.size === 1) return; // already the only one selected
    state.countries.clear();
    state.countries.add(code);
  }
  // Clear ALL cached data so it re-fetches cleanly
  state.showsByDate = {};
  state.fetchedDates.clear();
  state.loadingDates.clear();
  state.networkFilter = "All";
  // Re-fetch all currently selected dates
  state.selectedDates.forEach(dk => fetchDate(dk));
  render();
}

function initLazyImages() {
  const imgs = document.querySelectorAll("img.lazy-img[data-src]");
  if (!imgs.length) return;
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        img.src = img.dataset.src;
        img.removeAttribute("data-src");
        img.onload = () => { img.style.opacity = "1"; };
        observer.unobserve(img);
      }
    });
  }, { rootMargin: "200px" });
  imgs.forEach(img => observer.observe(img));
}

      banner = document.createElement("div");
      banner.id = "debugBanner";
      banner.style.cssText = "position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(168,48,42,0.9);color:#F5F0E8;font-size:11px;font-family:'JetBrains Mono',monospace;text-align:center;padding:4px;letter-spacing:1px;backdrop-filter:blur(4px)";
      banner.textContent = "⚠ DEBUG MODE — ALL FILTERS DISABLED — tap 🥔 5x to exit";
      document.body.prepend(banner);
    }
  } else {
    if (banner) banner.remove();
  }
}

// === Hash-based deep linking ===
const VALID_HASH_MODES = new Set(["guide", "calendar", "premieres"]);

const _originalSetMode = setMode;
setMode = function(mode) {
  _originalSetMode(mode);
  if (VALID_HASH_MODES.has(mode) && window.location.hash.slice(1) !== mode) {
    history.replaceState(null, "", "#" + mode);
  }
};

function applyHashRoute() {
  const hash = window.location.hash.slice(1).toLowerCase();
  if (VALID_HASH_MODES.has(hash) && hash !== state.mode) {
    setMode(hash);
  }
}
applyHashRoute();
window.addEventListener("hashchange", applyHashRoute);

// === Floating scroll-to-top button ===
(function setupScrollTopButton() {
  const btn = document.getElementById("scrollTopBtn");
  if (!btn) return;
  const SHOW_AFTER_PX = 600;
  let ticking = false;

  // Get current scroll position from whichever element is actually scrolling.
  // Some browsers/configs scroll the <html> element instead of window,
  // so check both and use whichever is non-zero.
  function getScrollY() {
    return window.scrollY ||
           document.documentElement.scrollTop ||
           document.body.scrollTop || 0;
  }

  function updateVisibility() {
    if (getScrollY() > SHOW_AFTER_PX) {
      btn.classList.add("visible");
    } else {
      btn.classList.remove("visible");
    }
    ticking = false;
  }

  function onScroll() {
    if (!ticking) {
      window.requestAnimationFrame(updateVisibility);
      ticking = true;
    }
  }

  // Listen on multiple targets to catch whichever one fires
  window.addEventListener("scroll", onScroll, { passive: true });
  document.addEventListener("scroll", onScroll, { passive: true });

  btn.addEventListener("click", () => {
    // Scroll the document/html element since that's what's actually scrollable
    if (document.documentElement.scrollTop > 0 || document.body.scrollTop > 0) {
      document.documentElement.scrollTo({ top: 0, behavior: "smooth" });
      document.body.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });

  // Run once on load to set initial state
  updateVisibility();
})();

// === Push notifications ===
(function setupPushNotifications() {
  if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;

  const PushNotifications = window.Capacitor.Plugins.PushNotifications;
  const App = window.Capacitor.Plugins.App;
  if (!PushNotifications) return;

  // Request permission then register with FCM
  PushNotifications.requestPermissions().then(result => {
    if (result.receive === "granted") {
      PushNotifications.register();
    } else {
      console.log("Push notification permission denied");
    }
  });

  // Device registered with FCM — token available
  PushNotifications.addListener("registration", token => {
    console.log("FCM token:", token.value);
    // Token is logged — useful for testing. In production,
    // you'd send this to your backend to store per-user.
    // For broadcast pushes via Firebase Console, you don't need it.
  });

  // Registration failed
  PushNotifications.addListener("registrationError", err => {
    console.error("Push registration error:", err.error);
  });

  // Notification received while app is in foreground
  PushNotifications.addListener("pushNotificationReceived", notification => {
    console.log("Push received:", notification);
    // App is open — you could show a custom in-app toast here
    // For now, we just log it. The notification won't show in the tray
    // when the app is foregrounded on Android unless you handle it.
  });

  // User tapped a notification (app was in background/closed)
  PushNotifications.addListener("pushNotificationActionPerformed", action => {
    console.log("Push tapped:", action);
    // Deep link based on notification data
    const data = action.notification.data || {};
    if (data.tab && VALID_HASH_MODES.has(data.tab)) {
      setMode(data.tab);
      window.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      // Default: open premieres tab
      setMode("premieres");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  });
})();

// === Android back button ===
(function setupNativeBackButton() {
  if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;

  const App = window.Capacitor.Plugins && window.Capacitor.Plugins.App;
  if (!App || !App.addListener) return;

  // Toast helper
  let toastEl = null;
  let toastTimer = null;
  function showToast(msg) {
    if (!toastEl) {
      toastEl = document.createElement("div");
      toastEl.style.cssText =
        "position:fixed;left:50%;bottom:96px;transform:translateX(-50%);" +
        "background:rgba(245,240,232,0.92);color:rgba(28,18,8,0.92);" +
        "font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1px;" +
        "text-transform:uppercase;padding:8px 16px;border-radius:6px;" +
        "border:1px solid rgba(45,90,39,0.25);" +
        "backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);" +
        "z-index:99999;pointer-events:none;opacity:0;transition:opacity 0.18s ease;" +
        "white-space:nowrap;";
      document.body.appendChild(toastEl);
    }
    toastEl.textContent = msg;
    requestAnimationFrame(() => { toastEl.style.opacity = "1"; });
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.style.opacity = "0"; }, 1800);
  }

  function isFreshState() {
    const yest = new Date(); yest.setDate(yest.getDate() - 1);
    const today = new Date();
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    const expectedKeys = [dateKey(yest), dateKey(today), dateKey(tmrw)];
    const hasExpectedDates =
      state.selectedDates.size === expectedKeys.length &&
      expectedKeys.every(k => state.selectedDates.has(k));
    const defaultNetwork = state.networkFilter === "All";
    const defaultCountry = state.countries.size === 1 && state.countries.has("US");
    return hasExpectedDates && defaultNetwork && defaultCountry;
  }

  function resetToFreshState() {
    state.networkFilter = "All";
    state.countries = new Set(["US"]);
    setMode("guide");
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  let exitArmedAt = 0;
  const EXIT_WINDOW_MS = 2000;

  App.addListener("backButton", () => {
    const openOverlay = document.querySelector(
      ".modal.open, .overlay.open, [data-open=\"true\"]"
    );
    if (openOverlay) {
      openOverlay.classList.remove("open");
      openOverlay.removeAttribute("data-open");
      return;
    }

    if (state.mode !== "guide") {
      setMode("guide");
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    if (!isFreshState()) {
      resetToFreshState();
      return;
    }

    const now = Date.now();
    if (now - exitArmedAt > EXIT_WINDOW_MS) {
      exitArmedAt = now;
      showToast("Press back to exit");
      return;
    }

    App.exitApp();
  });
})();
</script>
